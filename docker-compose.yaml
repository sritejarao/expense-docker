# create nework

networks:
  expense: {}

#create required voulmes

volumes:
  mysql:

services:

 #docker run -d --name mysql --network expense -v mysql:/var/lib/mysql mysql:1.0.0
  mysql:
    #build: ./mysql
    image: sriteja90/mysql:1.0.0
    networks:
    - expense
    volumes:
    - mysql:/var/lib/mysql
    container_name: mysql

 # docker run -d --name backend --network expense  backend:1.0.0
  backend:
    #build: ./backend
    image: sriteja90/backend:1.0.0
    command: sh -c "sleep 10 && node /opt/backend/index.js"
    networks:
    - expense
    container_name: backend
    depends_on:
    - mysql
  
 #docker run -d --name fronted --network expense -p 80:80 frontend:1.0.0
  frontend:
    #build: ./frontend
    image: sriteja90/frontend:1.0.0
    networks:
    - expense
    container_name: frontend
    ports:
    - 80:80
    depends_on:
    - backend
